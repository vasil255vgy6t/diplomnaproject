<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід адміністрації</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">Mental Health</div>
        <nav>
            <a href="index.html#home">Головна</a>
            <a href="index.html#tests">Тести</a>
            <a href="index.html#tips">Поради</a>
        </nav>
        <button class="login-btn" onclick="window.location.href='index.html'">Повернутися</button>
    </header>

    <section class="real-test-page auth-page">
        <div class="auth-card">
            <div id="loginForm" class="auth-form">
                <h2>Вхід для адміністрації навчального закладу</h2>
                <label>
                    Електронна пошта
                    <input type="email" id="loginEmail" required />
                </label>
                <label>
                    Пароль
                    <input type="password" id="loginPassword" required />
                </label>
                <button class="submit-test-btn" type="button" onclick="adminLogin()">Увійти</button>
            </div>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </section>

    <script src="auth.js"></script>
    <script src="login.js"></script>
</body>
</html>
